# docker-compose.yml
version: "3"
services:
  app:
    image: trade-engine:latest
    links:
      - postgres
    environment:
      DATABASE_URL: postgres://user:pass@host.docker.internal:5432/db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  postgres:
    image: postgres:11
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: db
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: pt-web:latest
    ports:
      - "3000:3000"